<article class="doc"><h1>X-4X-5显微熔点测定仪</h1><p>X-4/X-5显微熔点测定仪</p><p>   采用标准倍数80倍双目体视显微镜，视场大，工作距离大，立体感强。采用PID智能控温，设定温度和被测温度双排数字显示（X-5）。智能调控热台温度，具有冲温小、加热快，自动恒温的特点。热台采用220V/300W镍铬丝，使用寿命长，更换容易。</p><p><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAY0AAAFICAIAAAAj4DWBAAAAAXNSR0IArs4c6QAAAAlwSFlzAAAOxAAADsQBlSsOGwAA/7VJREFUeF7svQeAXUd1/7+9aLXq3erd3diWu3GvNFNDC52QkEIoCfklhBaSEAgkQPiHYghgOsY0G/febbnLVpesrpVWZXvf/X/O+d579u7bVbXayu96/XTffXPnzsyd+c73nDnnTOG2np7ygoKGts4la9c1tzUNKS87bfbcooKC9sKC9dt3LN+wrr2jo7C0dML4CRWlZTUbNr1i1sxRldxR0FZQsLmxYeWGjU2tbT2dnZVlZZPHjZs6evSIkuLSnoJCUnD0+B8H3/WXP/ItkG+BfAvsYwsU1nd1Dyko7Orq6S4p7Cgs6C7oGdpT2NNj8MJX/roK7A+EKekpKOWz286Liwq6ugs6iwpaCgvaCwrAtZKCgrIkTU9xQWFhoWeRgBVfCoryILWP7yafPN8C+RZQCxhCFQFOAElxQQdgVVxU1JkwIeCnp6ignZ8KDYlIxh+QUwjigEKgWZFBW2ehIRcJiknY3VNc2GMJUjoFxvkdhfZrvtXzLZBvgXwL7HsLFPZ09xR0mZzW3d3V3dNTUlpqXzu7DFtKisGe7gL7M5QBsDgzotVRUFICxBUUFfUUFBn54p8ixy9SWDqjUkrud5jIV2JJ8ke+BfItkG+BfW4BSFFXdzdgAooYjPT0wJPsH0OVnsKOnq6i4pKenm4uFoNDCHt8dnYUlJb2gFGWOOVJpOjqNLzr6SosLnLBr9DyTflUUV7y2+e3k78h3wL5FnC5r7MH7mQnJuR193R2dxWVoAfvdu4DFKGc6kFqM7nPRD1pnmBeBV3GnoqQBIsBoEIgCwpmIOZiYhyuPCcD+y3f4vkWyLdAvgX2pwXAKViQq8kdjEyq81U6dOECnC4oVWERrCn04kh20CrwC5wimdOwbldKSXNuuJbAUiICOkTl1/v25wXl78m3QL4FEM1MTvMlPFoDOQ3BzVGlV5eULNv5bwkpQt6z9Typ1MWTJOIJqhyn/LpwShQrj1P5/pZvgXwL7FcLFPZgkRAynmMRa3xiP70EKgGgvpKbi3iW0v8x2S5jL6Uc7C+1TsjLffv1gvI35Vsg3wImwqEkdwKl9Tk3MUh0TAEx2YYSWGV/ymikQKtE1OvbtkBfXj2V7275Fsi3wP61QMZUIBXNZHsg+S3zhwbKEC2R5AJ1BlCbZ2TGNCvlmT/yLZBvgXwL7EcLYJdgNp4CpfBx6b2SZMn6nplByR/GyFGwpv40Kb2SKNXTzPN8aj9eT/6WfAvkW8DQyew8Bzxs+c6hKTkEZyYWJogmzXkRenc7G0BLbut+ZreeZBBW6vmGz7dAvgXyLbAvLZDYdvY64xmrkmJcFCu1fjJ4MsVVD0ahRqbcBTCBIMMoXzPM+UtYWsrW9qFcxvLSQ7fJGFXkT7/sJrtIoLvyR74F8i1wcFqAoQYghK4oGZW7H577URI3KneLJ27u7DSD8owNgX9JbAzcOTkEwkTdbtdwmOGvH0ilNxqCDUC2dl/WHDzKft1X6Il796N19uOWA/6G9qMM+VvyLXAIWoCu3tXl/rvpn4FWhhlg89RLJ3pT7Y+u2hxc8Jhh0a+zq7OouIjH7IqomCW6GU4VAmdWAM7t7gOvd1Ll9Dg1tz3Gv8q5J8uw+r+P7O2kpykPGVQdsgcdgl6Yf0S+BfbYAkVFeNOBHgU+yDRMMck0IYbPhKLsMZe9SJBggWe6Z9BRs
